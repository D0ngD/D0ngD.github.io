<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OC網站製作中</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Noto Serif TC', serif;
      background: #f8f5f1;
      color: #333;
    }
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -1;
    }
    h1 {
      text-align: center;
      color: #a83232;
      margin-top: 2rem;
    }
    p {
      max-width: 800px;
      margin: 0 auto 2rem;
      font-size: 1.1rem;
      line-height: 1.8;
      text-align: center;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      padding-bottom: 4rem;
    }
    .gallery img {
      max-width: 300px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }
    .gallery img:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div id="particles-js"></div>
  <h1>標題</h1>
  <p>
    OC簡介行<br>
    OC簡介行2<br>
    OC簡介行3<br>
    我家OC最可愛
  </p>
  <div class="gallery">
    <img src="images/angel_blood_crown.png" alt="天使之血皇冠">
    <img src="images/angel_pose.png" alt="天使之姿">
    <img src="images/dark_wing_angel.png" alt="血色天使的黑翼魅影">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    window.addEventListener("load", () => {
      particlesJS("particles-js", {
        particles: {
          number: { value: 100, density: { enable: true, value_area: 800 } },
          color: { value: "#ff0000" },
          shape: { type: "circle" },
          opacity: { value: 0.6, random: true },
          size: { value: 2.5, random: true },
          line_linked: { enable: false },
          move: {
            enable: true,
            speed: 0.6,
            random: true,
            out_mode: "out"
          }
        },
        interactivity: {
          events: {
            onhover: { enable: true, mode: "grab" },
            resize: true
          },
          modes: {
            grab: { distance: 140, line_linked: { opacity: 0.5 } }
          }
        },
        retina_detect: true
      });
    });
  </script>
<!-- 滑鼠拖尾光點特效 -->
<script src="https://unpkg.com/cursor-effects@latest/dist/browser.js"></script>
<script>
  new window.cursorEffects.followingDotCursor({
    color: "255, 100, 150", // RGB 格式，想要粉紅光點可以改這裡
    radius: 6,
    zIndex: 9999
  });
  
</body>

</script>

</html>
