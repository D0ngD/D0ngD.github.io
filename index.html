<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>6</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Noto Serif TC', serif;
      background: #f8f5f1;
      color: #333;
    }
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -1;
    }
    h1 {
      text-align: center;
      color: #a83232;
      margin-top: 2rem;
    }
    p {
      max-width: 800px;
      margin: 0 auto 2rem;
      font-size: 1.1rem;
      line-height: 1.8;
      text-align: center;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      padding-bottom: 4rem;
    }
    .gallery img {
      max-width: 300px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }
    .gallery img:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div id="particles-js"></div>
  <h1>調諧者</h1>
  <p>
    他追求萬事和諧萬物的均衡。和畢達哥拉斯一樣，他認為萬事萬物都要適中，「過度的道德本身就是一種惡」。<br>
    因此，他常常做出矛盾的舉止，在降下懲罰的同時，他總要賜予恩典。<br>
    對他而言，教典的戒律不是絕對的指令，而是能夠維持與平衡所必須的調音。<br>
    對6，世間萬物之間似乎有一個無形的指針，他必須時刻保持清醒與黎明，使這枚跳躍始終位於絕對的中點。<br>
  </p>
  <div class="gallery">
    <img src="images/angel_blood_crown.png" alt="完備者">
    <img src="images/angel_pose.png" alt="何時何地">
    <img src="images/dark_wing_angel.png" alt="與火中得見">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    window.addEventListener("load", () => {
      particlesJS("particles-js", {
        particles: {
          number: { value: 100, density: { enable: true, value_area: 800 } },
          color: { value: "#ffffff" },
          shape: { type: "circle" },
          opacity: { value: 0.6, random: true },
          size: { value: 2.5, random: true },
          line_linked: { enable: false },
          move: {
            enable: true,
            speed: 0.6,
            random: true,
            out_mode: "out"
          }
        },
        interactivity: {
          events: {
            onhover: { enable: true, mode: "grab" },
            resize: true
          },
          modes: {
            grab: { distance: 140, line_linked: { opacity: 0.5 } }
          }
        },
        retina_detect: true
      });
    });
  </script>
</body>
</html>
